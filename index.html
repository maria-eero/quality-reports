<head>

<title>Quality Reports — Contract & Integration Test Gap Analysis</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 48px 24px;
    line-height: 1.6;
    max-width: 720px;
    margin: 0 auto;
  }
  h1 { font-size: 1.6rem; margin-bottom: 8px; }
  .subtitle { color: var(--muted); margin-bottom: 40px; font-size: 0.95rem; }
  .report-list { list-style: none; }
  .report-list li {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .report-list li:hover { border-color: var(--accent); }
  .report-list a {
    color: var(--text);
    text-decoration: none;
    display: block;
  }
  .report-date {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .report-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .report-desc { font-size: 0.85rem; color: var(--muted); }
</style>
</head>

  </li>
</ul>
