<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Readiness Audit — CNM 26.7</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
    --red: #ef4444;
    --orange: #f97316;
    --yellow: #eab308;
    --green: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 32px 24px;
  }
  #content {
    max-width: 900px;
    margin: 0 auto;
  }
  h1 { font-size: 1.8rem; margin: 32px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  h2 { font-size: 1.4rem; margin: 32px 0 12px; color: var(--accent); }
  h3 { font-size: 1.1rem; margin: 24px 0 8px; }
  p { margin: 12px 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  strong { color: var(--text); }
  code {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.85em;
  }
  blockquote {
    border-left: 3px solid var(--accent);
    background: rgba(99,102,241,0.08);
    padding: 12px 20px;
    margin: 16px 0;
    border-radius: 0 8px 8px 0;
  }
  blockquote p { margin: 4px 0; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 0.85rem;
  }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  tr:hover td { background: rgba(99,102,241,0.03); }
  ul, ol { margin: 12px 0; padding-left: 24px; }
  li { margin: 6px 0; }
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div id="content">
  <a class="back-link" href="../../">&larr; All Reports</a>
  <div id="markdown-body"></div>
</div>
<script>
fetch('CNM-26.7.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('markdown-body').innerHTML = marked.parse(md);
  });
</script>
</body>
</html>
